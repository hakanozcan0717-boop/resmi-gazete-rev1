name: Daily Resmi Gazete Data Update

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest

    steps:
      - name: Repo kodlarini indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Klasorleri olustur
        run: |
          mkdir -p exports
          mkdir -p data/downloads
          mkdir -p static_site

      - name: Son 2 gunun Resmi Gazete verisini cek
        run: |
          python main.py crawl --days 2

      - name: Analiz raporu uret
        run: |
          python main.py analyze --json-out exports/gunluk_analiz.json

      - name: Statik site uret
        run: |
          python generate_static_site.py

      - name: Degisiklikleri kontrol et
        id: changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Degisiklikleri GitHub'a kaydet
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f resmi_gazete.db
          git add -f exports/
          git add -f static_site/
          git commit -m "Gunluk Resmi Gazete verisi guncellendi"
          git push