name: Daily Resmi Gazete PostgreSQL + Qdrant Update

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Kaç günlük veri çekilip Qdrant'a indekslensin?"
        required: true
        default: "7"
      crawl_start:
        description: "Veri çekme başlangıç tarihi YYYY-MM-DD; boşsa days kullanılır"
        required: false
        default: ""
      crawl_end:
        description: "Veri çekme bitiş tarihi YYYY-MM-DD; boşsa days kullanılır"
        required: false
        default: ""
      import_sqlite:
        description: "Repo içindeki resmi_gazete.db verilerini PostgreSQL'e aktar"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      index_start:
        description: "Qdrant indeks başlangıç tarihi YYYY-MM-DD; boşsa days kullanılır"
        required: false
        default: ""
      index_end:
        description: "Qdrant indeks bitiş tarihi YYYY-MM-DD; boşsa days kullanılır"
        required: false
        default: ""

jobs:
  daily-update:
    runs-on: ubuntu-latest

    steps:
      - name: Repo kodlarini indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resmi Gazete verisini PostgreSQL'e cek
        timeout-minutes: 180
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRAWL_DAYS: ${{ inputs.days || '2' }}
          CRAWL_START: ${{ inputs.crawl_start }}
          CRAWL_END: ${{ inputs.crawl_end }}
        run: |
          if [ -n "$CRAWL_START" ] && [ -n "$CRAWL_END" ]; then
            python main.py crawl --start "$CRAWL_START" --end "$CRAWL_END" --timeout 45 --retries 1 --max-request-seconds 90
          else
            python main.py crawl --days "$CRAWL_DAYS" --timeout 45 --retries 1 --max-request-seconds 90
          fi

      - name: SQLite verilerini PostgreSQL'e aktar
        if: ${{ inputs.import_sqlite == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python main.py import-sqlite --sqlite-db resmi_gazete.db

      - name: Qdrant RAG indeksini guncelle
        timeout-minutes: 180
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          QDRANT_COLLECTION: ${{ secrets.QDRANT_COLLECTION }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_EMBEDDING_MODEL: text-embedding-3-small
          INDEX_DAYS: ${{ inputs.days || '2' }}
          INDEX_START: ${{ inputs.index_start }}
          INDEX_END: ${{ inputs.index_end }}
          CRAWL_START: ${{ inputs.crawl_start }}
          CRAWL_END: ${{ inputs.crawl_end }}
        run: |
          if [ -z "$INDEX_START" ] && [ -n "$CRAWL_START" ]; then
            INDEX_START="$CRAWL_START"
          fi
          if [ -z "$INDEX_END" ] && [ -n "$CRAWL_END" ]; then
            INDEX_END="$CRAWL_END"
          fi
          if [ -n "$INDEX_START" ] && [ -n "$INDEX_END" ]; then
            python main.py rag-index --start "$INDEX_START" --end "$INDEX_END"
          else
            python main.py rag-index --days "$INDEX_DAYS"
          fi

      - name: Secilen tarih araligi veritabaninda var mi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRAWL_START: ${{ inputs.crawl_start }}
          CRAWL_END: ${{ inputs.crawl_end }}
          INDEX_START: ${{ inputs.index_start }}
          INDEX_END: ${{ inputs.index_end }}
        run: |
          START_DATE="${CRAWL_START:-$INDEX_START}"
          END_DATE="${CRAWL_END:-$INDEX_END}"
          if [ -n "$START_DATE" ] && [ -n "$END_DATE" ]; then
            python -c "from core.database import GazetteDB; db=GazetteDB(); rows=db._fetchall('SELECT date, COUNT(*) AS belge_sayisi FROM gazette_items WHERE date >= ? AND date <= ? GROUP BY date ORDER BY date', ('$START_DATE', '$END_DATE')); print('Aralik:', '$START_DATE', '$END_DATE'); print('Gun sayisi:', len(rows)); [print(str(r['date']) + ': ' + str(r['belge_sayisi'])) for r in rows]"
          else
            python -c "from core.database import GazetteDB; db=GazetteDB(); rows=db._fetchall('SELECT date, COUNT(*) AS belge_sayisi FROM gazette_items GROUP BY date ORDER BY date DESC LIMIT 10'); print('Son 10 tarih:'); [print(str(r['date']) + ': ' + str(r['belge_sayisi'])) for r in rows]"
          fi

      - name: Analiz raporu uret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python main.py analyze --json-out exports/gunluk_analiz.json

      - name: Veritabani ozetini goster
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "from core.database import GazetteDB; db=GazetteDB(); r=db._fetchall('SELECT MIN(date) AS ilk_tarih, MAX(date) AS son_tarih, COUNT(DISTINCT date) AS gun_sayisi, COUNT(*) AS belge_sayisi FROM gazette_items')[0]; print('İlk tarih:', r['ilk_tarih']); print('Son tarih:', r['son_tarih']); print('Gün sayısı:', r['gun_sayisi']); print('Belge sayısı:', r['belge_sayisi'])"
