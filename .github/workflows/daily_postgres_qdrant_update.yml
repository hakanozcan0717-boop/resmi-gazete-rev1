name: Daily Resmi Gazete PostgreSQL + Qdrant Update

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

jobs:
  daily-update:
    runs-on: ubuntu-latest

    steps:
      - name: Repo kodlarini indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Son 2 gunun Resmi Gazete verisini PostgreSQL'e cek
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python main.py crawl --days 2

      - name: Qdrant RAG indeksini guncelle
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          QDRANT_COLLECTION: ${{ secrets.QDRANT_COLLECTION }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_EMBEDDING_MODEL: text-embedding-3-small
        run: |
          python main.py rag-index

      - name: Analiz raporu uret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python main.py analyze --json-out exports/gunluk_analiz.json
