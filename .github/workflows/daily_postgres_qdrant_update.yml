name: Daily Resmi Gazete Render Trigger

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Kac gunluk veri Render tarafindan cekilip Qdrant'a islensin?"
        required: true
        default: "2"
      crawl_start:
        description: "Baslangic tarihi YYYY-MM-DD; bossa days kullanilir"
        required: false
        default: ""
      crawl_end:
        description: "Bitis tarihi YYYY-MM-DD; bossa days kullanilir"
        required: false
        default: ""

jobs:
  trigger-render-update:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Render daily update tetikle
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          CRAWL_ADMIN_TOKEN: ${{ secrets.CRAWL_ADMIN_TOKEN }}
          DAYS: ${{ inputs.days || '2' }}
          CRAWL_START: ${{ inputs.crawl_start }}
          CRAWL_END: ${{ inputs.crawl_end }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          base_url = (os.environ.get("RENDER_APP_URL") or "").rstrip("/")
          token = os.environ.get("CRAWL_ADMIN_TOKEN") or ""
          days = int(os.environ.get("DAYS") or "2")
          start = os.environ.get("CRAWL_START") or ""
          end = os.environ.get("CRAWL_END") or ""

          if not base_url:
              raise SystemExit("RENDER_APP_URL secret eksik.")
          if not token:
              raise SystemExit("CRAWL_ADMIN_TOKEN secret eksik.")

          if not start or not end:
              turkey_tz = dt.timezone(dt.timedelta(hours=3))
              today = dt.datetime.now(turkey_tz).date()
              start = (today - dt.timedelta(days=days - 1)).isoformat()
              end = today.isoformat()

          print(f"Render URL: {base_url}")
          print("Tarih hesabi: Europe/Istanbul (UTC+3)")
          print(f"Tarih araligi: {start} - {end}")

          def request_json(method, path, payload=None):
              data = None
              headers = {
                  "X-Admin-Token": token,
                  "Accept": "application/json",
              }
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
                  headers["Content-Type"] = "application/json"

              req = urllib.request.Request(
                  base_url + path,
                  data=data,
                  headers=headers,
                  method=method,
              )
              try:
                  with urllib.request.urlopen(req, timeout=60) as response:
                      body = response.read().decode("utf-8")
                      return response.status, json.loads(body or "{}")
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace")
                  try:
                      parsed = json.loads(body or "{}")
                  except Exception:
                      parsed = {"error": body}
                  return exc.code, parsed

          status, data = request_json(
              "POST",
              "/admin/crawl",
              {"start": start, "end": end, "index": True},
          )
          print("Baslatma cevabi:", json.dumps(data, ensure_ascii=False))

          if status == 409 and isinstance(data.get("job"), dict):
              job_id = data["job"].get("id")
          elif status == 200:
              job_id = data.get("job_id")
          else:
              raise SystemExit(f"Render job baslatilamadi. HTTP {status}: {data}")

          if not job_id:
              raise SystemExit("Render job_id alinamadi.")

          terminal = {"completed", "empty", "failed"}
          last_log_count = 0
          final_data = None

          for _ in range(180):
              status, job = request_json("GET", f"/admin/jobs/{job_id}")
              if status != 200:
                  raise SystemExit(f"Render job okunamadi. HTTP {status}: {job}")

              logs = job.get("logs") or []
              for line in logs[last_log_count:]:
                  print(line)
              last_log_count = len(logs)

              print(
                  "Durum:",
                  job.get("status"),
                  "bulunan=",
                  job.get("found"),
                  "yeni=",
                  job.get("inserted"),
                  "atlanan=",
                  job.get("skipped"),
                  "qdrant=",
                  job.get("indexed_chunks"),
              )

              if job.get("status") in terminal:
                  final_data = job
                  break

              time.sleep(20)

          if final_data is None:
              raise SystemExit("Render job zaman asimina girdi.")
          if final_data.get("status") != "completed":
              raise SystemExit(f"Render job basarisiz: {final_data.get('status')} {final_data}")

          print("Render daily update tamamlandi.")
          PY
